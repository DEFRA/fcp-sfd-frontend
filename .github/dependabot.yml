version: 2

updates:
  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    open-pull-requests-limit: 5
    groups:
      docker-security:
        applies-to: security-updates
        patterns:
          - "*"
      docker-non-security:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      hapi:
        applies-to: version-updates
        patterns:
          - "@hapi/*"
          - "hapi-*"
          - "@defra/hapi-tracing"
          - "blankie"
      logging:
        applies-to: version-updates
        patterns:
          - "pino"
          - "pino-*"
          - "hapi-pino"
          - "@elastic/ecs-pino-format"
      build:
        applies-to: version-updates
        patterns:
          - "webpack"
          - "webpack-*"
          - "terser-webpack-plugin"
          - "copy-webpack-plugin"
          - "clean-webpack-plugin"
      css:
        applies-to: version-updates
        patterns:
          - "sass-embedded"
          - "sass-loader"
          - "postcss-*"
          - "autoprefixer"
          - "cssnano"
          - "cssnano-preset-default"
      lint:
        applies-to: version-updates
        patterns:
          - "eslint"
          - "neostandard"
          - "standard"
          - "stylelint"
          - "stylelint-*"
      tools:
        applies-to: version-updates
        patterns:
          - "vitest"
          - "@vitest/*"
          - "jsdom"
          - "nodemon"
          - "npm-run-all"
      types:
        applies-to: version-updates
        patterns:
          - "@types/*"
      npm-production:
        applies-to: version-updates
        dependency-type: "production"
        patterns:
          - "*"
      npm-development:
        applies-to: version-updates
        dependency-type: "development"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
      github-actions-non-security:
        applies-to: version-updates
        patterns:
          - "*"
